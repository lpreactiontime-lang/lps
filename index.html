<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VECMRO AI - Pilot Interface</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ffcc; --dark: #0a0a0a; }
        body { margin: 0; background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* Map with Cyberpunk Filter */
        #map { height: 60vh; width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); border-bottom: 2px solid var(--neon); }

        /* UI Panel */
        #vecmro-ui { height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        
        .search-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 10px; width: 90%; max-width: 500px; }
        input { flex: 1; padding: 15px; background: rgba(0,0,0,0.8); border: 1px solid var(--neon); color: var(--neon); border-radius: 4px; outline: none; }
        button { background: var(--neon); color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* Visualizer */
        .viz-box { display: flex; align-items: center; gap: 4px; height: 50px; margin-bottom: 15px; }
        .bar { width: 8px; background: var(--neon); height: 4px; border-radius: 4px; transition: height 0.1s; box-shadow: 0 0 10px var(--neon); }
        
        #status-text { font-size: 14px; text-transform: uppercase; text-align: center; max-width: 80%; }
        .listening { color: #ff0055 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="dest-input" placeholder="Type destination or say 'Vecmro, go to...'">
    <button onclick="manualStart()">ENGAGE</button>
</div>

<div id="map"></div>

<div id="vecmro-ui">
    <div class="viz-box" id="visualizer"></div>
    <div id="status-text">SYSTEM STANDBY. VOICE COMMANDS ACTIVE (SAY "VECMRO").</div>
</div>

<script>
    // --- 1. INITIALIZE MAP & ASSETS ---
    const map = L.map('map').setView([40.7128, -74.006], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    let routeLayer, pilotMarker;
    const viz = document.getElementById('visualizer');
    for(let i=0; i<15; i++) {
        const b = document.createElement('div');
        b.className = 'bar';
        viz.appendChild(b);
    }

    // --- 2. VOICE COMMANDS (THE WAKE WORD) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
            console.log("Heard:", transcript);
            
            if (transcript.includes("vecmro")) {
                const destination = transcript.split("go to")[1] || transcript.replace("vecmro", "");
                if (destination.trim()) {
                    document.getElementById('dest-input').value = destination.trim();
                    processRoute(destination.trim());
                }
            }
        };

        recognition.start();
        document.getElementById('status-text').classList.add('listening');
    }

    // --- 3. CORE LOGIC: SEARCH & ROUTING ---
    function manualStart() {
        const query = document.getElementById('dest-input').value;
        processRoute(query);
    }

    async function processRoute(query) {
        vecmroSpeak(`Calculating route to ${query}...`);
        
        // Geocoding (Photon)
        const geo = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=1`).then(r => r.json());
        if (!geo.features.length) return vecmroSpeak("Destination coordinates not found.");
        
        const end = geo.features[0].geometry.coordinates;
        
        // Get Live Location (Tip Integration)
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const start = [pos.coords.longitude, pos.coords.latitude];
            
            // Routing with Steps (OSRM)
            const route = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[0]},${start[1]};${end[0]},${end[1]}?overview=full&geometries=geojson&steps=true`).then(r => r.json());
            
            if (route.routes.length) {
                drawAndSimulate(route.routes[0]);
            }
        }, () => vecmroSpeak("GPS failure. Check permissions."));
    }

    // --- 4. ANIMATION: DRAW & SIMULATE DRIVE ---
    function drawAndSimulate(routeData) {
        if (routeLayer) map.removeLayer(routeLayer);
        if (pilotMarker) map.removeLayer(pilotMarker);

        routeLayer = L.geoJSON(routeData.geometry, {style: {color: '#00ffcc', weight: 5, opacity: 0.6}}).addTo(map);
        map.fitBounds(routeLayer.getBounds());

        const coords = routeData.geometry.coordinates;
        pilotMarker = L.circleMarker([coords[0][1], coords[0][0]], {color: '#ff0055', radius: 8}).addTo(map);

        const firstStep = routeData.legs[0].steps[0].maneuver.instruction;
        vecmroSpeak(`Route locked. ${firstStep}`);

        // Simulation Loop
        let i = 0;
        const drive = setInterval(() => {
            if (i >= coords.length - 1) {
                clearInterval(drive);
                vecmroSpeak("Simulation complete. You have arrived.");
                return;
            }
            i++;
            const nextPoint = [coords[i][1], coords[i][0]];
            pilotMarker.setLatLng(nextPoint);
            map.panTo(nextPoint);
        }, 100); // 100ms = High speed simulation
    }

    // --- 5. AUDIO VISUALIZER (TEXT-SYNCED) ---
    function vecmroSpeak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.pitch = 0.8; 
        msg.rate = 1.0;

        msg.onstart = () => {
            document.getElementById('status-text').innerText = "VECMRO: " + text.toUpperCase();
            startVizAnimation(text);
        };
        
        window.speechSynthesis.speak(msg);
    }

    function startVizAnimation(text) {
        const bars = document.querySelectorAll('.bar');
        const interval = setInterval(() => {
            if (!window.speechSynthesis.speaking) {
                clearInterval(interval);
                bars.forEach(b => b.style.height = '4px');
                return;
            }
            bars.forEach(b => {
                b.style.height = (Math.random() * 45 + 5) + 'px';
            });
        }, 80);
    }
</script>
</body>
</html>
